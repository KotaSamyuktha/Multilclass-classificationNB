apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: transacanalyzer-serving-template
  annotations:
    scenarios.ai.sap.com/description: "Transaction Analyzer - Flask API for tax category prediction"
    scenarios.ai.sap.com/name: "transacanalyzer"
    executables.ai.sap.com/description: "Flask serving executable for transaction analyzer"
    executables.ai.sap.com/name: "transacanalyzer-executable"
  labels:
    scenarios.ai.sap.com/id: "transacanalyzer"
    executables.ai.sap.com/id: "transacanalyzer-executable"
    ai.sap.com/version: "1.0.0"
spec:
  inputs:
    parameters:
      - name: market
        type: string
    artifacts: []
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: '{"autoscaling.knative.dev/metric": "concurrency", "autoscaling.knative.dev/target": "1"}'
      labels: '{"ai.sap.com/resourcePlan": "starter"}'
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 2
        containers:
          - name: kserve-container
            image: docker.io/jerushan/transaction-analyzer-rnd:latest
            ports:
              - containerPort: 8080
                protocol: TCP
            env:
              - name: PORT
                value: "8080"
              - name: MARKET
                value: "{{inputs.parameters.market}}"
            resources:
              limits:
                cpu: "2"
                memory: "4Gi"
              requests:
                cpu: "1"
                memory: "2Gi"
